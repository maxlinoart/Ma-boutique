<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boutique Linogravures</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            padding: 15px; 
            background-color: #f4f4f4; 
            margin: 0;
        }
        .produit { 
            background: white; 
            padding: 15px; 
            margin-bottom: 15px; 
            border-radius: 10px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
        }
        .produit h2 { 
            margin-top: 0; 
            font-size: 18px; 
            color: #333;
        }
        .produit p { 
            color: #666; 
            font-size: 16px;
        }
        .btn-ajouter { 
            background-color: #0088cc; 
            color: white; 
            border: none; 
            padding: 12px; 
            border-radius: 8px; 
            width: 100%; 
            font-size: 16px; 
            font-weight: bold;
        }
        #mon-panier { 
            background: white; 
            padding: 15px; 
            margin-top: 25px; 
            border-radius: 10px; 
            border: 2px solid #ddd; 
        }
        #btn-payer { 
            background: #28a745; 
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            display: none; /* Caché au début */
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <h1 style="text-align: center;">🎨 Mes Linogravures</h1>

    <div class="produit">
        <h2>Linogravure Ectoplasma</h2>
        <p>Prix : 10.00 €</p>
        <button class="btn-ajouter" onclick="addToCart('Linogravure Ectoplasma', 1000)">Ajouter au panier</button>
    </div>

    <div class="produit">
        <h2>Linogravure Psykokwak</h2>
        <p>Prix : 10.00 €</p>
        <button class="btn-ajouter" onclick="addToCart('Linogravure Psykokwak', 1000)">Ajouter au panier</button>
    </div>

    <div id="mon-panier">
        <h3 style="margin-top:0;">🛒 Mon Panier</h3>
        <ul id="liste-panier" style="padding-left: 20px; color: #444;">
            <li style="list-style-type: none; margin-left: -20px;">Le panier est vide.</li>
        </ul>
        <p style="font-size: 18px;"><strong>Total : <span id="total-panier">0.00</span> €</strong></p>
        <button id="btn-payer" onclick="validerCommande()">💳 Payer la commande</button>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Ouvre la fenêtre en grand sur le téléphone
        
        let panier = [];
        let totalCentimes = 0;

        // Fonction quand on clique sur "Ajouter au panier"
        function addToCart(nom, prix) {
            panier.push({ label: nom, amount: prix });
            totalCentimes += prix;
            mettreAJourAffichage();
            
            // Fait une petite vibration sur le téléphone si c'est supporté
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }
        }

        // Fonction qui met à jour le texte du panier
        function mettreAJourAffichage() {
            const liste = document.getElementById("liste-panier");
            liste.innerHTML = ""; // On vide la liste
            
            panier.forEach(item => {
                let li = document.createElement("li");
                li.innerText = item.label + " - " + (item.amount / 100).toFixed(2) + " €";
                liste.appendChild(li);
            });
            
            // Mise à jour du prix total
            document.getElementById("total-panier").innerText = (totalCentimes / 100).toFixed(2);
            
            // On affiche le bouton "Payer" vu qu'il y a des articles
            if (panier.length > 0) {
                document.getElementById("btn-payer").style.display = "block";
            }
        }

        // Fonction qui envoie la liste au bot quand on clique sur "Payer"
        function validerCommande() {
            tg.sendData(JSON.stringify({ articles: panier }));
        }
    </script>
</body>
</html>
